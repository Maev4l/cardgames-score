<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Felt texture gradient -->
    <radialGradient id="feltGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1f5c36"/>
      <stop offset="100%" stop-color="#0f2d1a"/>
    </radialGradient>
    <!-- Gold gradient for accent -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d875"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#aa8c2c"/>
    </linearGradient>
  </defs>

  <!-- Background circle with felt -->
  <circle cx="256" cy="256" r="240" fill="url(#feltGradient)"/>

  <!-- Gold border ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#goldGradient)" stroke-width="6"/>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

  <!-- Four card suits arranged in a diamond pattern -->
  <!-- Spade (top) - charcoal -->
  <g transform="translate(256, 130)">
    <path d="M0 -40 C-25 -10, -35 15, -35 35 C-35 55, -15 65, 0 50 C15 65, 35 55, 35 35 C35 15, 25 -10, 0 -40 Z M-12 50 L-12 70 L12 70 L12 50"
          fill="#f5f0e8" transform="scale(0.9)"/>
  </g>

  <!-- Heart (right) - ruby red -->
  <g transform="translate(360, 256)">
    <path d="M0 40 C-40 10, -40 -25, -20 -40 C0 -55, 20 -40, 20 -40 C20 -40, 40 -55, 60 -40 C80 -25, 80 10, 40 40 Z"
          fill="#c41e3a" transform="translate(-20, 0) scale(0.85)"/>
  </g>

  <!-- Diamond (bottom) - ruby red -->
  <g transform="translate(256, 382)">
    <path d="M0 -45 L30 0 L0 45 L-30 0 Z"
          fill="#c41e3a" transform="scale(0.9)"/>
  </g>

  <!-- Club (left) - charcoal -->
  <g transform="translate(152, 256)">
    <circle cx="0" cy="-20" r="18" fill="#f5f0e8"/>
    <circle cx="-18" cy="8" r="18" fill="#f5f0e8"/>
    <circle cx="18" cy="8" r="18" fill="#f5f0e8"/>
    <rect x="-6" y="10" width="12" height="30" fill="#f5f0e8"/>
  </g>

  <!-- Center "A" for Atout -->
  <text x="256" y="275"
        font-family="Georgia, serif"
        font-size="80"
        font-weight="600"
        fill="url(#goldGradient)"
        text-anchor="middle">A</text>
</svg>
